<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบสั่งอาหาร</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: auto;
      background: #fffefb;
    }

    h1 {
      text-align: center;
    }

    h2 {
      margin-top: 30px;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }


    .item-card {
      display: inline-block;
      width: 160px;
      margin: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      background: #fff;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
    }

    .item-card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
    }

    .item-info {
      padding: 10px;
    }

    .item-info p {
      margin: 5px 0;
    }

    .item-btn {
      background: #f57c00;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
    }

    .item-btn:hover {
      background: #e65100;
    }

    #order-summary {
      margin-top: 30px;
      background: #f9f9f9;
      padding: 20px;
      border-radius: 10px;
    }

    #order-summary ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <h1>🍽 ระบบสั่งอาหาร</h1>
  <div id="menu"></div>
  <div id="order-summary">
    <h2>🧾 รายการที่สั่ง</h2>
    <ul id="order-list"></ul>
    <p><strong>รวมทั้งหมด: <span id="total">0</span> บาท</strong></p>
  </div>

        { name: 'ยำมาม่าทะเล', price: 50, img: 'https://s359.kapook.com/pagebuilder/dd8fa42d-01a2-48c1-b146-a0770bf7d499.jpg'},
      ],
      '🥣 หมุกระทะ': [
        { name: 'หมูกระทะชุดเล็ก', price: 360, img: 'https://images.hungryhub.com/uploads/restaurants/5192/photos/150801/RackMultipart20241121-136-14uqttq.jpg' },
        { name: 'หมูกระทะชุดใหญ่', price: 560, img: 'https://images.hungryhub.com/uploads/restaurants/5192/photos/150801/RackMultipart20241121-136-14uqttq.jpg'}
      ]
    };

    const order = [];

    function renderMenu() {
      const menuDiv = document.getElementById('menu');
      for (const category in menu) {
        const group = document.createElement('div');
        group.className = 'menu-group';
        group.innerHTML = `<h2>${category}</h2>`;

        menu[category].forEach(item => {
          const card = document.createElement('div');
          card.className = 'item-card';

          card.innerHTML = `
            <img src="${item.img}" alt="${item.name}">
            <div class="item-info">
              <p>${item.name}</p>
              <p><strong>${item.price + 40}฿</strong></p>
              <button class="item-btn">สั่ง</button>
            </div>
          `;

          card.querySelector('.item-btn').onclick = () => addToOrder(item.name, item.price + 40);
          group.appendChild(card);
        });

        menuDiv.appendChild(group);
      }
    }

    function addToOrder(name, price) {
      const existing = order.find(i => i.name === name);
      if (existing) {
        existing.qty++;
      } else {
        order.push({ name, price, qty: 1 });
      }
      renderOrder();
    }

    function renderOrder() {
      const list = document.getElementById('order-list');
      list.innerHTML = '';
      let total = 0;
      order.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.name} x ${item.qty} = ${item.price * item.qty}฿`;
        list.appendChild(li);
        total += item.price * item.qty;
      });
      document.getElementById('total').textContent = total;
      console.log("📦 คำสั่งซื้อ:", order);
    }

    // ✅ เรียกใช้งาน
    renderMenu();
  </script>
</body>
</html>
